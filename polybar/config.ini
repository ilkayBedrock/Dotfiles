[colors]
background = #0f1419
foreground = #c9d1d9
accent     = #2F5F7A
soft       = #1B2228

[bar/main]
width = 100%
height = 22
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.accent}

border-size = 0

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = "FiraMono Nerd Font Mono:style=Medium:size=10;3"
font-1 = "FiraMono Nerd Font Mono:size=12;4"

modules-left = xworkspaces
modules-right = volume cpu ram wifi tray date

wm-restack = sxwm
override-redirect = false

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground = ${colors.accent}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = #555
label-empty-padding = 1

[module/volume]
type = internal/pulseaudio
use-ui-max = false

format-volume = <label-volume>
label-volume = 󰖀 %percentage%%
label-volume-foreground = ${colors.accent}

format-muted = <label-muted>
label-muted = 󰝟
label-muted-foreground = ${colors.accent}

click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

[module/cpu]
type = internal/cpu
interval = 2

format = <label>
label =  %percentage%%
label-foreground = ${colors.accent}

[module/ram]
type = internal/memory
interval = 2

format = <label>
label = 󰍛 %percentage_used%%
label-foreground = ${colors.accent}

[module/wifi]
type = internal/network
interface = wlp7s0
interval = 3

format-connected = <label-connected>
label-connected = 󰖩 %essid%
label-connected-foreground = ${colors.accent}

format-disconnected = <label-disconnected>
label-disconnected = no-wifi
label-disconnected-foreground = #555

[module/tray]
type = internal/tray

tray-spacing = 8px
format-margin = 6px

[module/date]
type = internal/date
interval = 5
date = %H:%M
label = %date%
label-foreground = ${colors.foreground}
